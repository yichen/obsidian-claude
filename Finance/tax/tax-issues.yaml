issues:
  - id: TAX-001
    created: "2026-03-13"
    status: OPEN
    year: 2023
    category: capital_gains
    title: "$220K cap gain discrepancy: 1099-B total vs 1040 Line 7"
    description: |
      Account 0887 1099-B shows $249,413 net gain.
      Filed 1040 Line 7 shows $29,189. Gap: ~$220K.
      All PDFs in prepare folder checked — no missing documents explain the gap.
    hypothesis: |
      CPA made Schedule D adjustments for RSU/ESPP adjusted cost basis
      from supplemental broker statements (basis "not reported to IRS" lots).
      This is expected and normal — the raw 1099-B totals don't match the
      adjusted Schedule D that CPAs use for filing.
    resolution_path: |
      Obtain filed Schedule D from 2023 tax return PDF (ask CPA or find in
      Dropbox archive). Map each adjustment line to confirm hypothesis.
    resolved_at: null
    resolution_note: null

