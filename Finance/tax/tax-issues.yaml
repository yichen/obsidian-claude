    description: |
      compute_1040.py backtest shows ~10% accuracy on capital gains line.
      Root cause: raw 1099-B totals are inputs, but CPAs apply adjusted
      basis from supplemental broker statements that are not parsed.
    hypothesis: |
      Once TAX-001 is resolved and Schedule D adjustment pattern is understood,
      can add an adjustment factor or parse supplemental statements.
    resolution_path: |
      Resolve TAX-001 first. Then either:
      (a) Parse Fidelity supplemental PDF (shows adjusted cost basis per lot), or
      (b) Model a fixed adjustment ratio derived from historical Schedule D data.
    resolved_at: null
    resolution_note: null

